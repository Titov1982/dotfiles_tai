
# Меняем префикс управления с C-b на C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Включаем управление мышкой
set -g mouse on

# Нумерация окон и панелей с 1 (вместо 0)
set -g base-index 1
setw -g pane-base-index 1

# Автоматическая перенумерация окон при закрытии
set -g renumber-windows on

# Удобное разделение панелей (используем | и -)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Навигация между панелями в стиле vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Быстрый перезапуск конфигурации
bind r source-file ~/.tmux.conf \; display "Конфигурация обновлена!"

set-option -g set-clipboard on

# Настройка цветов терминала
# set -g default-terminal "xterm-256color"
# set-option -ga terminal-overrides ",xterm-256color:Tc"
# set -ag terminal-overrides ",xterm-256color:RGB"

# Установка плагинов
set -g @plugin 'tmux-plugins/tpm'                   # Менеджер плагинов
set -g @plugin 'tmux-plugins/tmux-sensible'         # Установка плагина tmux-sensible
# set -g @plugin 'niksingh710/minimal-tmux-status'    # Установка плагина панели 
set -g @minimal-tmux-bg "#6272A4"

### Init TPM
run '~/.tmux/plugins/tpm/tpm'
